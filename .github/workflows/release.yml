name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # actions/checkout@v4.2.2 (Pinned for security)
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-java@v5.2.0 (Latest 2026 stable)
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2d398991f855e37f8f121d5c219485b0d0
        with:
          java-version: '17'
          distribution: 'temurin'

      # gradle/actions/setup-gradle@v4.3.0 (Official Gradle build tool)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@417ae30571c208c1d5683939634f669d45a052d0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup signing
        run: |
          # Use repo secret if available, otherwise generate ephemeral keystore
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore
            echo "KEYSTORE_FILE=/tmp/release.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            keytool -genkeypair -v \
              -keystore /tmp/release.keystore \
              -alias oracle_os \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass oracle_os_release \
              -keypass oracle_os_release \
              -dname "CN=Oracle_OS, O=ASI, L=Unknown, ST=Unknown, C=UK"
            echo "KEYSTORE_FILE=/tmp/release.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=oracle_os_release" >> $GITHUB_ENV
            echo "KEY_ALIAS=oracle_os" >> $GITHUB_ENV
            echo "KEY_PASSWORD=oracle_os_release" >> $GITHUB_ENV
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" "app/build/outputs/apk/release/Oracle_OS-${VERSION}.apk"

      # softprops/action-gh-release@v2.5.0 (The delivery truck driver)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81af2036c6416629e46a5827725925cf1564
        with:
          files: app/build/outputs/apk/release/Oracle_OS-*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
